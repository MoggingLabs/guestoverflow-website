# Continuous deployment for the GuestOverflow website.
#
#   main        -> build :prod    image -> deploy /srv/website/production  (guestoverflow.com)
#   development -> build :staging  image -> deploy /srv/website/staging     (staging.guestoverflow.com)
#
# Build happens here (not on the VPS); the server only pulls the image.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST    – VPS IP / hostname
#   VPS_USER    – deploy
#   VPS_SSH_KEY – PRIVATE half of the CI deploy key (public half is on the box)
# GITHUB_TOKEN is provided automatically and is used to push/pull from GHCR.
# NOTE: ensure the GHCR package is linked to this repo (or made public) so the
# token can pull it on the server — otherwise the pull step needs a separate PAT.

name: Deploy

on:
  push:
    branches: [main, development]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment from branch
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env_tag=prod"                       >> "$GITHUB_OUTPUT"
            echo "site_url=https://guestoverflow.com"        >> "$GITHUB_OUTPUT"
            echo "stack_dir=/srv/website/production"   >> "$GITHUB_OUTPUT"
          else
            echo "env_tag=staging"                          >> "$GITHUB_OUTPUT"
            echo "site_url=https://staging.guestoverflow.com"      >> "$GITHUB_OUTPUT"
            echo "stack_dir=/srv/website/staging"           >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ steps.vars.outputs.site_url }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.vars.outputs.env_tag }}
            ${{ steps.img.outputs.name }}:${{ steps.vars.outputs.env_tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ${{ steps.vars.outputs.stack_dir }}
            docker compose pull web
            docker compose up -d
            docker logout ghcr.io
            docker image prune -f
            # TODO: apply DB migrations here once the migration runner is wired.
