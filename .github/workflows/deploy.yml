# Continuous deployment for the GuestOverflow website.
#
#   main        -> build :prod    image -> deploy /srv/website/production  (guestoverflow.com)
#   development -> build :staging  image -> deploy /srv/website/staging     (staging.guestoverflow.com)
#
# Build happens here (not on the VPS); the server only pulls the image. The
# deploy connects via the existing Cloudflare Tunnel (cloudflared access ssh),
# gated by a Cloudflare Access service token — NOT a direct public :22 hop,
# which the provider edge was intermittently dropping.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VPS_USER                 – deploy
#   VPS_SSH_KEY              – PRIVATE half of the CI deploy key (public half on the box)
#   CF_ACCESS_CLIENT_ID      – Cloudflare Access service token client id
#   CF_ACCESS_CLIENT_SECRET  – Cloudflare Access service token client secret
# GITHUB_TOKEN is provided automatically and is used to push/pull from GHCR.
# (VPS_HOST is no longer used; the tunnel hostname ssh.guestoverflow.com is fixed.)

name: Deploy

on:
  push:
    branches: [main, development]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment from branch
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env_tag=prod"                       >> "$GITHUB_OUTPUT"
            echo "site_url=https://guestoverflow.com"        >> "$GITHUB_OUTPUT"
            echo "stack_dir=/srv/website/production"   >> "$GITHUB_OUTPUT"
          else
            echo "env_tag=staging"                          >> "$GITHUB_OUTPUT"
            echo "site_url=https://staging.guestoverflow.com"      >> "$GITHUB_OUTPUT"
            echo "stack_dir=/srv/website/staging"           >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ steps.vars.outputs.site_url }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.vars.outputs.env_tag }}
            ${{ steps.img.outputs.name }}:${{ steps.vars.outputs.env_tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy over the existing Cloudflare Tunnel instead of a direct TCP
      # connection to the VPS :22. The provider edge intermittently dropped
      # SYNs from GitHub's rotating runner IPs (silent ~30s connect timeouts);
      # routing through the tunnel + Cloudflare Access (service token) removes
      # that whole failure class and keeps public SSH closed.
      - name: Deploy over Cloudflare Tunnel
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          ACTOR: ${{ github.actor }}
          STACK_DIR: ${{ steps.vars.outputs.stack_dir }}
          SSH_HOST: ssh.guestoverflow.com
          # cloudflared reads these for the Access service-token handshake.
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          sudo curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          # GHCR token piped to the remote `docker login --password-stdin`.
          echo "$GHCR_TOKEN" | ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            -o "ProxyCommand=cloudflared access ssh --hostname %h" \
            "$VPS_USER@$SSH_HOST" "
              set -e
              docker login ghcr.io -u $ACTOR --password-stdin
              cd $STACK_DIR
              docker compose pull web
              docker compose run --rm web node scripts/migrate.mjs
              docker compose up -d
              docker logout ghcr.io
              docker image prune -f
            "
